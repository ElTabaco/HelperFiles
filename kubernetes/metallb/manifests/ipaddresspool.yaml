apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: first-pool
  namespace: metallb-system
spec:
  addresses:
    # EDIT THIS RANGE to match your LAN's reserved VIP pool.
    # These IPs must NOT be handed out by your DHCP server.
    - 192.168.0.2-192.168.0.29
  autoAssign: true
  avoidBuggyIPs: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: empty
  namespace: metallb-system
